<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sondora Systems</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#ffffff;
      font-family:Arial, Helvetica, sans-serif;
      overflow:hidden;
      position:relative;
    }

    /* brilho suave inspirado na logo */
    .background-glow{
      position:absolute;
      width:700px;
      height:700px;
      background:radial-gradient(circle,
      rgba(0,212,255,0.10) 0%,
      rgba(124,58,237,0.08) 30%,
      transparent 70%);
      filter:blur(40px);
      z-index:0;
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      padding:40px;
      animation:fadeIn 1.2s ease;
    }

    .logo{
      width:320px;
      max-width:90%;
      margin-bottom:25px;
      filter:drop-shadow(0 0 18px rgba(0, 183, 255, 0.18));
      animation:floating 4s ease-in-out infinite;
    }

    h1{
      font-size:4.5rem;
      font-weight:800;
      letter-spacing:2px;
      margin-bottom:18px;
      text-transform:uppercase;
      line-height:1;
    }

    .main-text{
      background:linear-gradient(90deg, #5b21b6, #0077ff, #00c2ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .systems{
      color:#9ca3af;
      font-weight:300;
    }

    .subtitle{
      font-size:1.4rem;
      color:#6b7280;
      margin-bottom:35px;
      letter-spacing:1px;
    }

    .btn{
      padding:15px 38px;
      border:none;
      border-radius:60px;
      background:linear-gradient(90deg, #5b21b6, #0077ff);
      color:white;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.35s ease;
      box-shadow:0 10px 30px rgba(0, 119, 255, 0.22);
    }

    .btn:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:0 15px 35px rgba(0, 119, 255, 0.35);
    }

    /* detalhes decorativos */
    .circle{
      position:absolute;
      border-radius:50%;
      filter:blur(2px);
      opacity:0.5;
    }

    .circle1{
      width:14px;
      height:14px;
      background:#00d4ff;
      top:15%;
      left:20%;
    }

    .circle2{
      width:10px;
      height:10px;
      background:#7c3aed;
      bottom:18%;
      right:22%;
    }

    .circle3{
      width:8px;
      height:8px;
      background:#00b7ff;
      top:30%;
      right:18%;
    }

    @keyframes floating{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media(max-width:768px){

      h1{
        font-size:2.8rem;
      }

      .subtitle{
        font-size:1.1rem;
      }

      .logo{
        width:240px;
      }

      .btn{
        padding:14px 28px;
      }
    }

  </style>
</head>

<body>

  <div class="background-glow"></div>

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>
  <div class="circle circle3"></div>

  <div class="container">

  
    <img src="img/SONDORA LOGO SECUNDARIA PNG.png" alt="Sondora Logo" class="logo">

    <h1>
      <span class="main-text">Sondora</span>
      <span class="systems">Systems</span>
    </h1>

    <p class="subtitle">
      Estamos preparando algo incrível.<br>
      Em breve!
    </p>

    <button class="btn" onclick="history.back()">
      ← Voltar
    </button>

  </div>

</body>
</html>
